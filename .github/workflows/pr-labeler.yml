name: PR Labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels
        uses: actions/labeler@v6
        with:
          sync-labels: true
