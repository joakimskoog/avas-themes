name: Suggest a theme
description: Suggest a new theme for Ava's Themes
title: "[Theme request]: "
labels: ["theme request"]
body:
  - type: input
    id: theme-name
    attributes:
      label: Theme name
      description: What theme would you like to see added?
      placeholder: Dracula, Gruvbox, Tokyo Night...
    validations:
      required: true

  - type: input
    id: theme-link
    attributes:
      label: Theme link
      description: Link to the official palette, docs, or an existing port.
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: extra-details
    attributes:
      label: Extra details
      description: Add anything else that would help, like preferred variants or screenshots.
